<!-- public/offline.html -->
<!-- Offline fallback page served when connection is lost and a page is not cached. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Intense Reload</title>
  <style>
    :root {
      --background: #09090b;
      --foreground: #fafafa;
      --card: #18181b;
      --card-foreground: #fafafa;
      --muted: #27272a;
      --muted-foreground: #a1a1aa;
      --primary: #fafafa;
      --primary-foreground: #18181b;
      --border: #27272a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--background);
      color: var(--foreground);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .container {
      background-color: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
    }

    .icon-wrapper {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 4rem;
      height: 4rem;
      border-radius: 50%;
      background-color: var(--muted);
      margin-bottom: 1.5rem;
      color: var(--muted-foreground);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      letter-spacing: -0.025em;
    }

    p {
      color: var(--muted-foreground);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 44px;
      padding: 0.75rem 1.5rem;
      background-color: var(--primary);
      color: var(--primary-foreground);
      font-weight: 500;
      font-size: 0.95rem;
      text-decoration: none;
      border-radius: 0.375rem;
      transition: opacity 0.2s ease;
    }

    .btn:hover, .btn:focus {
      opacity: 0.9;
      outline: none;
    }

    .btn-secondary {
      background-color: transparent;
      color: var(--foreground);
      border: 1px solid var(--border);
      margin-top: 0.75rem;
    }

    .btn-secondary:hover {
      background-color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <!-- Lucide CloudLightning or WifiOff equivalent SVG -->
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
        <line x1="2" y1="2" x2="22" y2="22" />
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>We couldn't connect to the network. Don't worry, you can still queue and log counter sales offline. They will sync automatically when your connection is restored.</p>
    <a href="/dashboard/log-sale" class="btn">Log Sales Offline</a>
    <a href="javascript:window.location.reload();" class="btn btn-secondary">Retry Connection</a>
  </div>
</body>
</html>
